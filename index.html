<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Netflix</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body>
    <header>
        <h1>Quem está assistindo?</h1>
        <button id="theme-toggle" class="theme-toggle" aria-label="Alternar entre modo claro e escuro">
            <span class="theme-icon">🌙</span>
        </button>
    </header>
    <main>
        <section aria-labelledby="profiles-title">
            <h2 id="profiles-title" class="sr-only">Seleção de Perfil</h2>
            <ul class="profiles" id="profilesList">
                <!-- Perfis dinâmicos serão inseridos aqui -->
            </ul>
        </section>

        <!-- Botão gerenciar perfis -->
        <div class="action-buttons" id="actionButtons" style="margin-top: 30px;">
            <button class="btn-manage" id="btnManagePerfis" title="Gerenciar perfis">
                <i class="fas fa-cog"></i> Gerenciar perfis
            </button>
        </div>

        <!-- Modo edição -->
        <div class="edit-mode-buttons" id="editModeButtons" style="display: none; margin-top: 30px;">
            <button class="btn-cancel" id="btnCancelEdit">Cancelar</button>
            <button class="btn-delete-all" id="btnDeleteAll">Limpar tudo</button>
        </div>

        <!-- Botão adicionar perfil -->
        <button class="btn-add-profile" id="btnAddProfile" style="margin-top: 30px;">
            <i class="fas fa-plus"></i> Adicionar Perfil
        </button>
    </main>

    <!-- Modal para adicionar perfil -->
    <div class="modal" id="addProfileModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Adicionar novo perfil</h2>
                <button class="close-modal" id="closeModal">&times;</button>
            </div>
            
            <div class="modal-body">
                <div class="form-group">
                    <label for="profileName">Nome do perfil:</label>
                    <input 
                        type="text" 
                        id="profileName" 
                        placeholder="Digite o nome do perfil"
                        maxlength="20"
                    >
                </div>

                <div class="form-group">
                    <label>Escolha um avatar:</label>
                    <div class="avatar-selector" id="avatarSelector">
                        <!-- Avatares serão inseridos aqui -->
                    </div>
                </div>

                <button class="btn-save" id="btnSaveProfile">Salvar perfil</button>
            </div>
        </div>
    </div>

    <!-- Overlay do modal -->
    <div class="modal-overlay" id="modalOverlay"></div>

    <script src="js/app.js"></script>
    <script src="js/index.js"></script>
</body>
</html>
